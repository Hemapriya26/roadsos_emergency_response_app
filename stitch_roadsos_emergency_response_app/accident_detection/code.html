<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Accident Detection Alert</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#fbf9f9",
                        "on-surface": "#1b1c1c",
                        "surface-container-highest": "#e3e2e2",
                        "surface-dim": "#dbdad9",
                        "primary-container": "#d32f2f",
                        "on-primary-container": "#fff2f0",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-container-low": "#f5f3f3",
                        "surface-container-high": "#e9e8e7",
                        "tertiary": "#565858",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-surface-variant": "#5b403d",
                        "on-secondary": "#ffffff",
                        "outline": "#8f6f6c",
                        "surface": "#fbf9f9",
                        "primary-fixed-dim": "#ffb3ac",
                        "secondary-fixed-dim": "#c8c6c5",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f2f0f0",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed": "#410003",
                        "error": "#ba1a1a",
                        "surface-variant": "#e3e2e2",
                        "secondary": "#5f5e5e",
                        "inverse-surface": "#303031",
                        "tertiary-container": "#6e7070",
                        "on-tertiary-container": "#f4f4f4",
                        "on-error": "#ffffff",
                        "on-background": "#1b1c1c",
                        "on-primary": "#ffffff",
                        "outline-variant": "#e4beba",
                        "surface-container": "#efeded",
                        "primary-fixed": "#ffdad6",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-secondary-fixed": "#1c1b1b",
                        "secondary-container": "#e5e2e1",
                        "inverse-primary": "#ffb3ac",
                        "primary": "#af101a",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#474646",
                        "secondary-fixed": "#e5e2e1",
                        "on-primary-fixed-variant": "#930010",
                        "on-secondary-container": "#656464",
                        "surface-tint": "#ba1a20",
                        "background": "#fbf9f9",
                        "warning": "#f59e0b",
                        "on-warning": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-mobile": "20px",
                        "safe-bottom-zone": "80px",
                        "baseline": "8px",
                        "touch-target-min": "48px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Public Sans"],
                        "label-xl": ["Public Sans"],
                        "headline-lg-mobile": ["Public Sans"],
                        "body-md": ["Public Sans"],
                        "body-lg": ["Public Sans"],
                        "headline-xl": ["Public Sans"],
                        "label-md": ["Public Sans"],
                        "display-lg": ["Public Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-xl": ["16px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "headline-xl": ["34px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "display-lg": ["64px", { "lineHeight": "72px", "fontWeight": "900", "letterSpacing": "-0.04em" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bright text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container relative">
<!-- Intentional Omission: TopAppBar and BottomNavBar are suppressed as this is a high-stakes, transactional/modal screen flow where global navigation would cause dangerous distraction. -->
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center items-center px-margin-mobile pt-[64px] pb-safe-bottom-zone relative z-10">
<!-- Urgent Visual Indicator - Background Pulse effect simulated with static concentric circles for immediate attention without animation -->
<div class="absolute inset-0 flex items-center justify-center -z-10 overflow-hidden pointer-events-none">
<div class="w-[300px] h-[300px] rounded-full bg-error-container/40 absolute"></div>
<div class="w-[450px] h-[450px] rounded-full bg-error-container/20 absolute"></div>
<div class="w-[600px] h-[600px] rounded-full bg-error-container/10 absolute"></div>
</div>
<!-- Alert Content Box -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-3xl shadow-[0_8px_32px_rgba(186,26,26,0.15)] border border-error-container overflow-hidden flex flex-col items-center text-center">
<!-- Header/Icon -->
<div class="w-full bg-error py-8 flex flex-col items-center justify-center">
<div class="w-20 h-20 bg-on-error rounded-full flex items-center justify-center shadow-md mb-4">
<span aria-hidden="true" class="material-symbols-outlined fill text-error text-[48px]">warning</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-error px-4">Possible Accident Detected</h1>
</div>
<!-- Body Content -->
<div class="p-8 w-full flex flex-col items-center">
<p class="font-body-lg text-body-lg text-on-surface mb-6">Are you safe? We noticed a sudden impact or rapid deceleration.</p>
<!-- Countdown Timer -->
<div class="mb-8 flex flex-col items-center">
<span class="font-display-lg text-display-lg text-error">29</span>
<span class="font-label-xl text-label-xl text-error uppercase tracking-wider">Seconds</span>
</div>
<div class="w-full bg-surface-container-low rounded-xl p-4 mb-8 flex items-start gap-4 border border-surface-dim">
<span aria-hidden="true" class="material-symbols-outlined text-tertiary mt-1">info</span>
<p class="font-body-md text-body-md text-tertiary text-left">If you do not respond before the timer ends, an SOS signal will be automatically sent to emergency services with your location.</p>
</div>
<!-- Action Buttons (Thumb Zone) -->
<div class="w-full flex flex-col gap-4">
<!-- Primary Dismiss Action (Safe) -->
<button class="w-full h-16 bg-surface-container-highest text-on-surface font-label-xl text-label-xl rounded-2xl border border-surface-dim shadow-sm flex items-center justify-center gap-2 hover:bg-surface-dim transition-colors active:scale-95">
<span aria-hidden="true" class="material-symbols-outlined">check_circle</span>
                        I'm Safe, Cancel SOS
                    </button>
<!-- Urgent Trigger Action (Needs Help Now) -->
<button class="w-full h-16 bg-primary text-on-primary font-label-xl text-label-xl rounded-2xl shadow-[0_4px_12px_rgba(175,16,26,0.3)] flex items-center justify-center gap-2 hover:bg-surface-tint transition-colors active:scale-95">
<span aria-hidden="true" class="material-symbols-outlined fill">emergency_home</span>
                        Send SOS Now
                    </button>
</div>
</div>
</div>
</main>
</body></html>
