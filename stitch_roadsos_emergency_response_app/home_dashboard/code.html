</div>
</div>

</button>

</div>

</div>
<div class="absolute top-[60%] left-[15%] flex items-center justify-center w-8 h-8 rounded-full bg-surface shadow-md border border-outline-variant/30 text-tertiary">
<span class="material-symbols-outlined text-[18px]">car_repair</span>
</div>
<!-- User Location Pin -->
<div class="absolute top-[50%] left-[50%] transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center w-12 h-12">
<div class="absolute w-full h-full rounded-full bg-primary/20 animate-ping"></div>
<div class="w-4 h-4 rounded-full bg-primary border-2 border-surface shadow-lg z-10"></div>
</div>

<div class="absolute bottom-6 left-0 w-full px-margin-mobile flex flex-col gap-6 items-center">

<button class="relative group outline-none focus:outline-none">

<div class="absolute inset-0 rounded-full bg-primary/10 scale-150 animate-pulse"></div>
<div class="absolute inset-0 rounded-full bg-primary/20 scale-125 animate-pulse delay-75"></div>

</div>
<span class="font-label-md text-label-md text-on-surface text-[12px]">Police</span>
</button>

<span class="font-label-md text-label-md text-[10px]">Dashboard</span>
